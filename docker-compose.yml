services:

  # ── Base de données PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: agri_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_DATABASE:-agri_platform}
      POSTGRES_USER:     ${DB_USERNAME:-agri_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - agri_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - agri_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-agri_user} -d ${DB_DATABASE:-agri_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Laravel (PHP-FPM) ────────────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: agri_app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      DB_CONNECTION:  pgsql
      DB_HOST:        db
      DB_PORT:        "5432"
      DB_DATABASE:    ${DB_DATABASE:-agri_platform}
      DB_USERNAME:    ${DB_USERNAME:-agri_user}
      DB_PASSWORD:    ${DB_PASSWORD:-secret}
      CACHE_STORE:    file
      SESSION_DRIVER: file
    volumes:
      # Montage complet du backend (inclut .env s'il existe)
      - ./backend:/var/www
    networks:
      - agri_network
    depends_on:
      db:
        condition: service_healthy

  # ── Serveur web Nginx ────────────────────────────────────────────────────────
  webserver:
    image: nginx:stable-alpine
    container_name: agri_webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - agri_network
    depends_on:
      - app

  # ── Frontend Angular (dev server) ────────────────────────────────────────────
  frontend:
    image: node:lts-alpine
    container_name: agri_frontend
    working_dir: /app
    volumes:
      - ./frontend-web:/app
    ports:
      - "4200:4200"
    # npm install réutilise node_modules existant, puis ng serve
    command: >
      sh -c "npm install --prefer-offline
      && npx ng serve --host 0.0.0.0 --port 4200 --poll 500"
    networks:
      - agri_network

  # ── Jenkins CI ───────────────────────────────────────────────────────────────
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: agri_jenkins
    user: root
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - agri_jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - agri_network
    mem_limit: 1g

  # ── SonarQube ────────────────────────────────────────────────────────────────
  sonarqube:
    image: sonarqube:community
    container_name: agri_sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      SONAR_JDBC_URL:      jdbc:postgresql://db:5432/sonarqube
      SONAR_JDBC_USERNAME: ${DB_USERNAME:-agri_user}
      SONAR_JDBC_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - agri_sonar_data:/opt/sonarqube/data
      - agri_sonar_logs:/opt/sonarqube/logs
      - agri_sonar_extensions:/opt/sonarqube/extensions
    networks:
      - agri_network
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 2g

networks:
  agri_network:
    driver: bridge

volumes:
  agri_pgdata:
    driver: local
  agri_jenkins_home:
    driver: local
  agri_sonar_data:
    driver: local
  agri_sonar_logs:
    driver: local
  agri_sonar_extensions:
    driver: local
