name: Build Android APK (test)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mobile-app/**'
      - '.github/workflows/mobile-apk.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build apk --release

      - name: Publish rolling release with the APK
        run: |
          gh release delete mobile-latest --yes --cleanup-tag || true
          gh release create mobile-latest \
            build/app/outputs/flutter-apk/app-release.apk \
            --title "SenAgriLink mobile — dernière build de test" \
            --notes "Build automatique depuis le commit ${{ github.sha }}. Pointe vers le backend public (senagrilink-backend.onrender.com). À installer manuellement (source inconnue à autoriser sur Android)."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
