# ── Identification du projet ──────────────────────────────────────────────────
sonar.projectKey=agri-platform
sonar.projectName=Plateforme de Gestion Intégrée de l'Approvisionnement Agricole
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# ── Sources analysées ─────────────────────────────────────────────────────────
sonar.sources=backend/app,frontend-web/src

# Sources de tests (non comptabilisées comme code de production)
sonar.tests=backend/tests,frontend-web/src

sonar.test.inclusions=\
    backend/tests/**/*.php,\
    frontend-web/src/**/*.spec.ts

# Exclusions globales
sonar.exclusions=\
    **/vendor/**,\
    **/node_modules/**,\
    **/.git/**,\
    **/storage/**,\
    **/bootstrap/cache/**,\
    **/public/index.php,\
    **/resources/views/**,\
    mobile-app/**

# ── Backend PHP / Laravel ─────────────────────────────────────────────────────
# Rapport de couverture généré par PHPUnit (--coverage-clover)
sonar.php.coverage.reportPaths=backend/coverage.xml
# Rapport de tests JUnit généré par PHPUnit (--log-junit)
sonar.php.tests.reportPath=backend/test-report.xml

# ── Frontend Angular / TypeScript ─────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=frontend-web/coverage/lcov.info
sonar.typescript.tsconfigPaths=frontend-web/tsconfig.json

# ── Qualité & seuils ──────────────────────────────────────────────────────────
# Seuil de couverture minimum (Quality Gate configurable depuis l'UI SonarQube)
# sonar.coverage.exclusions=**/migrations/**,**/factories/**,**/seeders/**
sonar.exclusions=\
    **/vendor/**,\
    **/node_modules/**,\
    **/storage/**,\
    **/bootstrap/cache/**,\
    backend/database/migrations/**,\
    backend/database/factories/**,\
    backend/database/seeders/**,\
    backend/public/**,\
    backend/resources/**
